<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    :root { color-scheme: light; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 320px;
      margin: 0;
      padding: 16px;
      color: #191919;
      background: #fff;
    }
    h1 { font-size: 15px; margin: 0 0 4px; }
    p.sub { font-size: 12px; color: #5e5e5e; margin: 0 0 14px; line-height: 1.4; }
    .count {
      font-size: 30px;
      font-weight: 700;
      color: #0a66c2;
      line-height: 1;
    }
    .count-label { font-size: 12px; color: #5e5e5e; margin-bottom: 14px; }
    button {
      display: block;
      width: 100%;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 20px;
      padding: 9px 16px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    #download { background: #0a66c2; color: #fff; }
    #download:hover { background: #004182; }
    #download:disabled { background: #c7d6e6; cursor: not-allowed; }
    #refresh { background: #eef3f8; color: #0a66c2; }
    #clear { background: transparent; color: #b24020; font-weight: 600; }
    .status { font-size: 11px; color: #5e5e5e; min-height: 14px; margin-top: 4px; }
    .warn {
      font-size: 11px; color: #915907; background: #fef9e7;
      border-radius: 6px; padding: 8px; margin-bottom: 12px; line-height: 1.4;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Sales Navigator Lead Extractor</h1>
  <p class="sub">Scroll through your Sales Navigator search results, then download. Leads are captured automatically as the page loads them.</p>

  <div id="notSalesNav" class="warn">Open a LinkedIn Sales Navigator search or list page (linkedin.com/sales/…) for capture to work.</div>

  <div class="count" id="count">0</div>
  <div class="count-label">leads captured</div>

  <button id="download" disabled>Download CSV</button>
  <button id="refresh">Refresh count</button>
  <button id="clear">Clear captured data</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
